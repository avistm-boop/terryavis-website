<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome | Terry Avis Coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,800;0,900;1,800&family=Barlow:wght@300;400&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #080808;
    --charcoal: #111111;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #f0ede8;
    --grey: #888880;
    --light-grey: #ccc8c0;
    --mid: #2a2a2a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 60px 24px;
  }
  .container { max-width: 600px; margin: 0 auto; }
  .eyebrow {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .eyebrow span { width: 40px; height: 1px; background: var(--gold); display: inline-block; }
  h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(3.5rem, 8vw, 7rem);
    font-weight: 800;
    text-transform: uppercase;
    line-height: 0.95;
    margin-bottom: 32px;
  }
  h1 em { font-style: italic; color: var(--gold); }
  .lead { font-size: 1.15rem; color: var(--light-grey); line-height: 1.8; margin-bottom: 16px; }
  .sub { font-size: 1rem; color: var(--grey); line-height: 1.8; margin-bottom: 48px; }
  .contact-box {
    border: 1px solid rgba(201,168,76,0.25);
    padding: 40px;
    margin-bottom: 48px;
    background: var(--charcoal);
  }
  .contact-label {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
  }
  .phone {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--white);
    text-decoration: none;
    letter-spacing: 0.05em;
    display: block;
  }
  .phone:hover { color: var(--gold); }
  .sign-off { font-size: 1rem; color: var(--light-grey); font-style: italic; margin-bottom: 40px; }
  .back {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--grey);
    text-decoration: none;
  }
  .back:hover { color: var(--gold); }
</style>
</head>
<body>
  <div class="container">
    <div class="eyebrow">
      <span></span>
      Welcome Aboard
      <span></span>
    </div>
    <h1>You're <em>In.</em></h1>
    <p class="lead">Welcome to Terry Avis Coaching.</p>
    <p class="sub">Your spot is confirmed. I'll be in touch within 24 hours to get everything set up and hit the ground running.</p>
    <div class="contact-box">
      <p class="contact-label">In the meantime, reach out directly</p>
      <a href="tel:+61408725622" class="phone">+61 408 725 622</a>
    </div>
    <p class="sign-off">— Terry</p>
    <a href="/" class="back">← Back to site</a>
  </div>
</body>
</html>
